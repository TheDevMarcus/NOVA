<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA → CHUG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 70% 20%, #0b1f3a, #030712);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
            color: #e2e9ff;
        }
        .container {
            max-width: 880px;
            width: 100%;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(21, 55, 107, 0.5);
            border: 1px solid #2f5597;
            border-radius: 60px;
            padding: 0.5rem 1.2rem 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #b6d0ff;
            backdrop-filter: blur(4px);
            margin-bottom: 2rem;
        }
        .badge i {
            font-size: 0.9rem;
            color: #5695ff;
        }
        h1 {
            font-size: 5.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(115deg, #ffffff 0%, #9bc0ff 70%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        .transition {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin: 1.2rem 0 1.8rem;
        }
        .old-name {
            font-size: 2.2rem;
            font-weight: 300;
            color: #a0b9e0;
            opacity: 0.7;
            text-decoration: line-through 2px #ff657c;
            text-decoration-thickness: 3px;
            text-underline-offset: 8px;
        }
        .arrow {
            font-size: 2.2rem;
            color: #3e7eda;
            font-weight: 200;
        }
        .new-name {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #b0d0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .sub {
            font-size: 1.25rem;
            color: #9bb5e3;
            margin-bottom: 2.5rem;
            border-left: 4px solid #2f6ad0;
            padding-left: 1.5rem;
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.1), transparent);
        }
        .url-block {
            background: #0a1429;
            border-radius: 2rem;
            padding: 0.2rem;
            border: 1px solid #294580;
            box-shadow: 0 18px 30px -12px #000000, 0 0 0 1px rgba(70, 130, 255, 0.3) inset;
            margin: 2.5rem 0 2rem;
        }
        .url-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0b1a32;
            border-radius: 2rem;
            padding: 0.3rem 0.3rem 0.3rem 2rem;
            border: 1px solid #25477a;
        }
        .url-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .url-left i {
            font-size: 1.8rem;
            color: #5d9eff;
        }
        .url-left span {
            font-size: 1.7rem;
            font-weight: 500;
            color: #d6e5ff;
            letter-spacing: -0.01em;
        }
        .visit-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background: #1e3e7c;
            padding: 1rem 2.2rem;
            border-radius: 3rem;
            font-size: 1.3rem;
            font-weight: 500;
            color: white;
            text-decoration: none;
            border: 1px solid #6190ff;
            transition: 0.2s;
            box-shadow: 0 6px 0 #0b1b38;
        }
        .visit-btn i {
            font-size: 1.2rem;
            color: #b6d6ff;
        }
        .visit-btn:hover {
            background: #234c99;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #0b1b38;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            margin: 3.5rem 0 2rem;
            justify-content: center;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(10, 25, 55, 0.7);
            border: 1px solid #294577;
            border-radius: 60px;
            padding: 0.6rem 1.8rem 0.6rem 1.2rem;
            backdrop-filter: blur(4px);
            font-size: 1.1rem;
            color: #c7dbff;
        }
        .feature-item i {
            font-size: 1.3rem;
            color: #5085f0;
            width: 1.8rem;
            text-align: center;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #1d345a;
            padding-top: 2rem;
            margin-top: 1.5rem;
            color: #7f9ed0;
            font-size: 1rem;
        }
        .status-left i {
            color: #3973e0;
            margin-right: 0.5rem;
        }
        .version {
            background: #0f2042;
            border-radius: 30px;
            padding: 0.3rem 1.2rem;
            border: 1px solid #305caa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">
            <i class="fas fa-rotate"></i>
            <span>official rebrand · secure migration</span>
        </div>
        
        <h1>we rebranded</h1>
        
        <div class="transition">
            <span class="old-name">NOVA</span>
            <span class="arrow"><i class="fas fa-arrow-right-long"></i></span>
            <span class="new-name">CHUG</span>
        </div>
        
        <div class="sub">
            <i class="fas fa-shield-halved" style="margin-right: 10px; color: #4a86ff;"></i>
            upgraded to a safer, faster online version
        </div>
        
        <div class="url-block">
            <div class="url-inner">
                <div class="url-left">
                    <i class="fas fa-lock"></i>
                    <span>thebigdon.web.app</span>
                </div>
                <a href="https://thebigdon.web.app" target="_blank" rel="noopener noreferrer" class="visit-btn">
                    <span>access</span>
                    <i class="fas fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>
        
        <div class="features">
            <div class="feature-item">
                <i class="fas fa-bolt"></i>
                <span>zero latency</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-water"></i>
                <span>fluid interface</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-circle-check"></i>
                <span>always safe</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-gem"></i>
                <span>your choice!</span>
            </div>
        </div>
        
        <div class="status">
            <div class="status-left">
                <i class="fas fa-circle" style="color: #2acf8b; font-size: 0.7rem;"></i>
                <span>all services operational</span>
            </div>
            <div class="version">
                <i class="fas fa-code-branch" style="margin-right: 6px;"></i> v2.6 · CHUG core
            </div>
        </div>
    </div>
</body>
</html>

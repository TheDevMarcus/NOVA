<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NOVA · report issue</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #ff8c00;
    --primary-glow: rgba(255, 140, 0, 0.6);
    --primary-deep: #e03c00;
    --bg-deep: #0a0300;
    --glass-bg: rgba(20, 8, 0, 0.6);
    --glass-border: rgba(255, 140, 0, 0.15);
    --glass-border-hover: rgba(255, 140, 0, 0.35);
    --text-dim: #ffd1a8;
    --trans-smooth: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 100%, #200800 0%, #050100 100%);
    font-family: 'Outfit', sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    position: relative;
    overflow-x: hidden;
}

#ember-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.7;
}

.wrapper {
    position: relative;
    z-index: 30;
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.distro-header {
    text-align: center;
    margin-bottom: 0.5rem;
}

.distro-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 10px;
    background: linear-gradient(180deg, #ffffff 0%, #ffcda8 60%, #ff8c00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px var(--primary-glow));
    animation: logoFloat 4s infinite alternate ease-in-out;
    line-height: 1;
}

@keyframes logoFloat {
    0% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(255,100,0,0.4)); }
    100% { transform: translateY(-3px); filter: drop-shadow(0 0 25px rgba(255,140,0,0.7)); }
}

.distro-sub {
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.5);
    padding: 0.3rem 1rem;
    border-radius: 30px;
    display: inline-block;
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    margin-top: 0.5rem;
}

.card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 1.8rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: var(--trans-smooth);
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
}

.card:hover {
    border-color: var(--glass-border-hover);
    box-shadow: 0 25px 50px -15px rgba(0,0,0,0.9), 0 0 30px rgba(255, 100, 0, 0.1);
}

.tag {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 0.3rem 1rem;
    border-radius: 30px;
    background: rgba(255, 140, 0, 0.08);
    color: var(--primary);
    border: 1px solid rgba(255, 140, 0, 0.2);
    display: inline-block;
    margin-bottom: 0.8rem;
}

.card h2 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
}

.card p {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin: 0 auto 1.2rem;
    font-weight: 300;
}

.btn-primary {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff7b00, #d92b00);
    color: white;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: var(--trans-smooth);
    box-shadow: 0 8px 20px rgba(200, 50, 0, 0.3), inset 0 2px 0 rgba(255,255,255,0.2);
    font-family: 'Outfit', sans-serif;
    position: relative;
    z-index: 5;
}

.btn-primary:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #ff9433, #f03d00);
    box-shadow: 0 12px 25px rgba(220, 70, 0, 0.5), inset 0 2px 0 rgba(255,255,255,0.3);
}

.btn-primary:active {
    transform: translateY(1px);
    box-shadow: 0 4px 10px rgba(150, 40, 0, 0.4);
}

.form-group {
    margin-bottom: 1rem;
    text-align: left;
}

.form-group label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
}

.form-group input, .form-group select {
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 0.8rem;
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
}

.form-group input:focus, .form-group select:focus {
    border-color: var(--primary);
}

.form-group select option {
    background: #1a0800;
    color: white;
}

.smooth-antimon {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), #ffea00, var(--primary), transparent);
    filter: blur(2px);
    opacity: 0.8;
    animation: slideAntimon 4s infinite linear;
}

@keyframes slideAntimon {
    0% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
}

#reportSuccess {
    display: none;
    text-align: center;
    color: #4cd137;
    font-size: 0.85rem;
    margin-top: 1rem;
}

.footer-links {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 0.5rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(255, 140, 0, 0.1);
}

.btn-back {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.5);
    font-family: 'Outfit', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: var(--trans-smooth);
    display: flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
}

.btn-back:hover {
    color: var(--primary);
    text-shadow: 0 0 8px var(--primary-glow);
}
</style>
</head>
<body>
<canvas id="ember-canvas"></canvas>

<div class="wrapper">
    <div class="distro-header">
        <h1>NOVA</h1>
        <div class="distro-sub">REPORT ISSUE</div>
    </div>

    <div class="card">
        <div class="smooth-antimon"></div>
        <span class="tag">📋 FEEDBACK</span>
        <h2>report broken app</h2>
        <p>Help us fix broken downloads</p>
        
        <form id="reportForm" onsubmit="submitReport(event)">
            <div class="form-group">
                <label>App or Game Name</label>
                <input type="text" id="appName" placeholder="e.g. Minecraft" required>
            </div>
            <div class="form-group">
                <label>Which link is broken?</label>
                <select id="brokenLink" required>
                    <option value="">Select an option...</option>
                    <option value="main">Main Download Link</option>
                    <option value="mirror1">Mirror Link 1</option>
                    <option value="mirror2">Mirror Link 2</option>
                    <option value="all">All Links are broken</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" style="padding: 0.8rem;">Submit Report</button>
            <div id="reportSuccess">✔ Report sent successfully! Returning to main page...</div>
        </form>
    </div>

    <div class="footer-links">
        <a href="index.html" class="btn-back">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Download
        </a>
    </div>
</div>

<script>
const canvas = document.getElementById('ember-canvas');
const ctx = canvas.getContext('2d');
let embers = [];
const EMBER_COUNT = 80;

function initEmbers() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    embers = [];
    const colors = ['rgba(255, 100, 0, ', 'rgba(255, 160, 0, ', 'rgba(255, 50, 0, '];
    for (let i = 0; i < EMBER_COUNT; i++) {
        embers.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 1.5 + 0.5,
            speedY: Math.random() * 0.6 + 0.2,
            speedX: Math.random() * 0.3 - 0.15,
            glow: Math.random() * 0.5 + 0.2,
            phase: Math.random() * Math.PI * 2,
            colorBase: colors[Math.floor(Math.random() * colors.length)]
        });
    }
}

function drawEmbers() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const time = Date.now() / 800;
    for (let e of embers) {
        const flicker = 0.5 + 0.5 * Math.sin(time * 3 + e.phase);
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fillStyle = `${e.colorBase}${e.glow * flicker})`;
        ctx.fill();
        e.y -= e.speedY;
        e.x += Math.sin(time + e.phase) * 0.2 + e.speedX;
        if (e.y < -10) {
            e.y = canvas.height + 10;
            e.x = Math.random() * canvas.width;
        }
        if (e.x > canvas.width) e.x = 0;
        if (e.x < 0) e.x = canvas.width;
    }
    requestAnimationFrame(drawEmbers);
}
window.addEventListener('resize', initEmbers);
initEmbers();
drawEmbers();

const successMsg = document.getElementById('reportSuccess');

function submitReport(e) {
    e.preventDefault();
    const appName = document.getElementById('appName').value;
    const brokenLink = document.getElementById('brokenLink').value;
    
    console.log(`Report Submitted: App - ${appName}, Link - ${brokenLink}`);
    
    successMsg.style.display = 'block';
    document.getElementById('reportForm').reset();
    
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 2000);
}
</script>
</body>
</html>

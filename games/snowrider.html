<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Rider</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="game-frame" src="about:blank" allowfullscreen></iframe>
    <script>
        const jsonUrl = "https://raw.githubusercontent.com/TheDevMarcus/NOVA/refs/heads/main/games/truffledurl.json";
        const gamePath = "/games/snowrider3D-main/index.html";
        const iframe = document.getElementById('game-frame');

        async function loadGame() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                const baseUrl = data.url || data.baseUrl || (Array.isArray(data) ? data[0] : data);
                iframe.src = baseUrl.replace(/\/$/, "") + gamePath;
            } catch (error) {
                console.error(error);
            }
        }
        loadGame();
    </script>
</body>
</html>

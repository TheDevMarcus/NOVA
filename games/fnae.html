<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAE · EPSTIEN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            visibility: hidden;
            z-index: 1;
        }
        #entrance-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #e0e0e0;
            text-align: center;
            padding: 1.5rem;
            transition: opacity 0.6s cubic-bezier(0.45, 0, 0.55, 1);
            opacity: 1;
            visibility: visible;
        }
        .entrance-container {
            max-width: 720px;
            width: 90%;
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 4rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .pre-title {
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #666666;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }
        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.1;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(255,255,255,0.1);
            margin-bottom: 2.5rem;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            text-transform: uppercase;
        }
        .fixed-line {
            font-size: 1.6rem;
            font-weight: 300;
            background: #1a1a1a;
            display: inline-block;
            padding: 0.9rem 3rem 1rem 3rem;
            margin: 0.5rem 0 3.5rem 0;
            border: 1px solid #333333;
            color: #cccccc;
            letter-spacing: 1.5px;
        }
        .fixed-line strong {
            font-weight: 600;
            color: #ffffff;
            margin: 0 4px;
        }
        .enter-btn {
            background: #1a1a1a;
            border: 1px solid #333333;
            padding: 1.4rem 5rem;
            font-size: 2rem;
            font-weight: 500;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            margin: 1rem 0 1rem 0;
            min-width: 320px;
        }
        .enter-btn:hover {
            background: #242424;
            border-color: #444444;
        }
        .enter-btn:active {
            background: #0f0f0f;
            transform: translateY(2px);
        }
        .foot-note {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .fixed-line { font-size: 1.3rem; padding: 0.7rem 1.5rem; }
            .enter-btn { font-size: 1.5rem; letter-spacing: 4px; padding: 1.2rem 2rem; min-width: auto; }
        }
    </style>
</head>
<body>
    <div id="entrance-screen">
        <div class="entrance-container">
            <div class="pre-title">PRESENTS</div>
            <h1>FIVE NIGHTS<br>AT EPSTIENS</h1>
            <div class="fixed-line">
                fixed by <strong>CHIP HILL AND TRUFFLED</strong>
            </div>
            <button class="enter-btn" id="enter-btn">ENTER</button>
            <div class="foot-note">click to enter</div>
        </div>
    </div>
    <iframe id="game-frame" src="about:blank" allowfullscreen></iframe>
    <script>
        (function(){
            const entrance = document.getElementById('entrance-screen');
            const gameFrame = document.getElementById('game-frame');
            const enterBtn = document.getElementById('enter-btn');
            const jsonUrl = "https://raw.githubusercontent.com/TheDevMarcus/NOVA/refs/heads/main/games/truffledurl.json";
            const gamePath = "/gamefile/fnae.html";

            async function init() {
                try {
                    const response = await fetch(jsonUrl);
                    const data = await response.json();
                    const baseUrl = data.url || data.baseUrl || (Array.isArray(data) ? data[0] : data);
                    gameFrame.src = baseUrl.replace(/\/$/, "") + gamePath;
                } catch (e) {
                    console.error(e);
                }
            }

            function revealGame() {
                entrance.style.opacity = '0';
                setTimeout(() => {
                    entrance.style.visibility = 'hidden';
                    gameFrame.style.visibility = 'visible';
                }, 550);
            }

            enterBtn.addEventListener('click', revealGame);
            init();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NOVA · distribution</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #ff8c00;
    --primary-glow: rgba(255, 140, 0, 0.6);
    --primary-deep: #e03c00;
    --bg-deep: #0a0300;
    --glass-bg: rgba(20, 8, 0, 0.6);
    --glass-border: rgba(255, 140, 0, 0.15);
    --glass-border-hover: rgba(255, 140, 0, 0.35);
    --text-dim: #ffd1a8;
    --trans-smooth: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 100%, #200800 0%, #050100 100%);
    font-family: 'Outfit', sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    position: relative;
    overflow-x: hidden;
}

#ember-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.7;
}

.wrapper {
    position: relative;
    z-index: 30;
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.distro-header {
    text-align: center;
    margin-bottom: 0.5rem;
}

.distro-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 10px;
    background: linear-gradient(180deg, #ffffff 0%, #ffcda8 60%, #ff8c00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px var(--primary-glow));
    animation: logoFloat 4s infinite alternate ease-in-out;
    line-height: 1;
}

@keyframes logoFloat {
    0% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(255,100,0,0.4)); }
    100% { transform: translateY(-3px); filter: drop-shadow(0 0 25px rgba(255,140,0,0.7)); }
}

.distro-sub {
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.5);
    padding: 0.3rem 1rem;
    border-radius: 30px;
    display: inline-block;
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    margin-top: 0.5rem;
}

.card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 1.8rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: var(--trans-smooth);
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
}

.card:hover {
    border-color: var(--glass-border-hover);
    box-shadow: 0 25px 50px -15px rgba(0,0,0,0.9), 0 0 30px rgba(255, 100, 0, 0.1);
}

.tag {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 0.3rem 1rem;
    border-radius: 30px;
    background: rgba(255, 140, 0, 0.08);
    color: var(--primary);
    border: 1px solid rgba(255, 140, 0, 0.2);
    display: inline-block;
    margin-bottom: 0.8rem;
}

.card h2 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
}

.card p {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin: 0 auto 1.2rem;
    font-weight: 300;
}

.btn-primary {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff7b00, #d92b00);
    color: white;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: var(--trans-smooth);
    box-shadow: 0 8px 20px rgba(200, 50, 0, 0.3), inset 0 2px 0 rgba(255,255,255,0.2);
    font-family: 'Outfit', sans-serif;
    position: relative;
    z-index: 5;
}

.btn-primary:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #ff9433, #f03d00);
    box-shadow: 0 12px 25px rgba(220, 70, 0, 0.5), inset 0 2px 0 rgba(255,255,255,0.3);
}

.btn-primary:active {
    transform: translateY(1px);
    box-shadow: 0 4px 10px rgba(150, 40, 0, 0.4);
}

#status {
    font-size: 0.7rem;
    font-weight: 500;
    color: #ffcda8;
    letter-spacing: 1.5px;
    background: rgba(10, 3, 0, 0.6);
    padding: 0.6rem 1rem;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    text-align: center;
    backdrop-filter: blur(10px);
}

.tutorial-section {
    background: rgba(15, 5, 0, 0.4);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 1rem;
    position: relative;
    overflow: hidden;
}

.tutorial-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0.8rem;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: white;
}

.tutorial-title svg {
    stroke: var(--primary);
    width: 16px;
    height: 16px;
}

.step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
}

.step:last-child {
    margin-bottom: 0;
}

.step-number {
    width: 18px;
    height: 18px;
    background: rgba(255, 140, 0, 0.15);
    border: 1px solid rgba(255, 140, 0, 0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--primary);
}

.step-text strong { color: white; }

.footer-links {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.5rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(255, 140, 0, 0.1);
}

.footer-note {
    color: rgba(255,255,255,0.2);
    font-size: 0.55rem;
    letter-spacing: 3px;
}

.btn-report {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: var(--trans-smooth);
    display: flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
    color: rgba(255, 255, 255, 0.5);
}

.btn-report:hover {
    color: var(--primary);
    text-shadow: 0 0 8px var(--primary-glow);
}

.smooth-antimon {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), #ffea00, var(--primary), transparent);
    filter: blur(2px);
    opacity: 0.8;
    animation: slideAntimon 4s infinite linear;
}

@keyframes slideAntimon {
    0% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
}
</style>
</head>
<body>
<canvas id="ember-canvas"></canvas>

<div class="wrapper">
    <div class="distro-header">
        <h1>NOVA</h1>
        <div class="distro-sub">BUILD V<span id="build-version">...</span></div>
    </div>

    <div class="card">
        <div class="smooth-antimon"></div>
        <span class="tag">🔥 STABLE 🔥</span>
        <h2>core bundle</h2>
        <p>Signed cryptographic bundle · NOVA-<span id="bundle-version">...</span></p>
        <button class="btn-primary" id="downloadBtn" onclick="downloadApp()">⬇ DOWNLOAD NOW</button>
    </div>

    <div id="status">⚡ READY ⚡</div>

    <div class="tutorial-section">
        <div class="tutorial-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 16v-4M12 8h.01"></path>
            </svg>
            <span>HOW TO OPEN</span>
        </div>
        <div class="step">
            <div class="step-number">1</div>
            <div class="step-text"><strong>Download</strong> the file above</div>
        </div>
        <div class="step">
            <div class="step-number">2</div>
            <div class="step-text">Open your <strong>Downloads folder</strong></div>
        </div>
        <div class="step">
            <div class="step-number">3</div>
            <div class="step-text"><strong>Double click</strong> the file to launch</div>
        </div>
    </div>

    <div class="footer-links">
        <div class="footer-note">CHIP HILL · DISTRIBUTION</div>
        <a href="report.html" class="btn-report">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            Report Issue
        </a>
    </div>
</div>

<script>
let currentVersion = "2.0";
async function fetchNovaVersion() {
    try {
        const res = await fetch('https://raw.githubusercontent.com/TheDevMarcus/NOVA/refs/heads/main/main/backend/verison.json');
        if (!res.ok) throw new Error('Network response was not ok');
        const text = await res.text();
        try {
            const parsed = JSON.parse(text);
            currentVersion = parsed.version || parsed;
        } catch (e) {
            currentVersion = text.trim();
        }
    } catch (error) {
        console.warn("Using default version fallback.");
    }
    document.getElementById('build-version').innerText = currentVersion;
    document.getElementById('bundle-version').innerText = currentVersion;
}
fetchNovaVersion();

const canvas = document.getElementById('ember-canvas');
const ctx = canvas.getContext('2d');
let embers = [];
const EMBER_COUNT = 80;

function initEmbers() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    embers = [];
    const colors = ['rgba(255, 100, 0, ', 'rgba(255, 160, 0, ', 'rgba(255, 50, 0, '];
    for (let i = 0; i < EMBER_COUNT; i++) {
        embers.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 1.5 + 0.5,
            speedY: Math.random() * 0.6 + 0.2,
            speedX: Math.random() * 0.3 - 0.15,
            glow: Math.random() * 0.5 + 0.2,
            phase: Math.random() * Math.PI * 2,
            colorBase: colors[Math.floor(Math.random() * colors.length)]
        });
    }
}

function drawEmbers() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const time = Date.now() / 800;
    for (let e of embers) {
        const flicker = 0.5 + 0.5 * Math.sin(time * 3 + e.phase);
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fillStyle = `${e.colorBase}${e.glow * flicker})`;
        ctx.fill();
        e.y -= e.speedY;
        e.x += Math.sin(time + e.phase) * 0.2 + e.speedX;
        if (e.y < -10) {
            e.y = canvas.height + 10;
            e.x = Math.random() * canvas.width;
        }
        if (e.x > canvas.width) e.x = 0;
        if (e.x < 0) e.x = canvas.width;
    }
    requestAnimationFrame(drawEmbers);
}
window.addEventListener('resize', initEmbers);
initEmbers();
drawEmbers();

const statusEl = document.getElementById('status');
window.downloadApp = async function() {
    const url = "https://raw.githubusercontent.com/TheDevMarcus/verison/refs/heads/main/main/nova.html";
    statusEl.innerText = "🌀 DOWNLOADING ...";
    statusEl.style.color = "#ffb700";
    statusEl.style.borderColor = "rgba(255, 140, 0, 0.5)";
    
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `nova-v${currentVersion}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        
        statusEl.innerText = "✔ DOWNLOADED · CHECK FOLDER";
        statusEl.style.color = "#ffcda8";
        statusEl.style.borderColor = "rgba(255, 140, 0, 0.8)";
    } catch (err) {
        statusEl.innerText = "✖ FAILED · TRY AGAIN";
        statusEl.style.color = "#ff4d4d";
        statusEl.style.borderColor = "rgba(255, 0, 0, 0.5)";
    }
};
</script>
</body>
</html>
